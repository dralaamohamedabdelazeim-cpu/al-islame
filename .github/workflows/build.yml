name: Build Islamic App APK

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    name: Build APK
    runs-on: ubuntu-latest

    steps:
      - name: ✅ Checkout code
        uses: actions/checkout@v4

      - name: ☕ Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: 🔧 Make gradlew executable
        run: chmod +x ./gradlew

      - name: 📥 Download Gradle Wrapper JAR
        run: |
          mkdir -p gradle/wrapper
          curl -sL "https://github.com/gradle/gradle/raw/v8.7.0/gradle/wrapper/gradle-wrapper.jar" \
            -o gradle/wrapper/gradle-wrapper.jar

      - name: 📦 Cache Gradle packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: 🔨 Build Debug APK
        run: ./gradlew assembleDebug --stacktrace

      - name: 📤 Upload Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: محمد-عبد-العظيم-الطويل-الإسلامي-APK
          path: app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30

      - name: 🔨 Build Release APK
        run: ./gradlew assembleRelease --stacktrace

      - name: 📤 Upload Release APK
        uses: actions/upload-artifact@v4
        with:
          name: محمد-عبد-العظيم-الطويل-Release-APK
          path: app/build/outputs/apk/release/app-release.apk
          retention-days: 30
